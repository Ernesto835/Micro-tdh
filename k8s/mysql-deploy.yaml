# =========================
# MySQL Deployment + Service
# =========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: pedidos
spec:
  selector:
    matchLabels:
      app: mysql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "123456"
            - name: MYSQL_DATABASE
              value: "mydb"
            - name: MYSQL_USER
              value: "juli"
            - name: MYSQL_PASSWORD
              value: "juli"
          volumeMounts:
            - name: mysql-persistent-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-persistent-storage
          persistentVolumeClaim:
            claimName: mysql-pv-claim
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: pedidos
spec:
  ports:
    - port: 3306
      targetPort: 3306
  selector:
    app: mysql
  clusterIP: None
---
# =================================
# Microservicio Deployment + Service
# =================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservicio-demo
  namespace: pedidos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: microservicio-demo
  template:
    metadata:
      labels:
        app: microservicio-demo
    spec:
      containers:
        - name: microservicio-demo
          image: deyner1/microservicio-pedidos:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:3306/mydb?useSSL=false"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "123456"
---
apiVersion: v1
kind: Service
metadata:
  name: microservicio-demo-service
  namespace: pedidos
spec:
  type: LoadBalancer
  selector:
    app: microservicio-demo
  ports:
    - port: 80        # Puerto externo
      targetPort: 8081  # Puerto interno del contenedor