name: Build and Deploy Microservicio

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Fix line endings
      run: |
        sudo apt-get update && sudo apt-get install -y dos2unix
        find . -name "*.properties" -exec dos2unix {} \;

    - name: Build with Maven
      run: ./mvnw clean package -DskipTests

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: deyner1/microservicio-pedidos:1.0

    - name: Azure login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set AKS context
      uses: azure/aks-set-context@v3
      with:
        resource-group: MC_microservicio_group_microservicio_canadacentral
        cluster-name: microservicio

    - name: Deploy to AKS
      run: |
        kubectl apply -f k8s/microservicio-demo-deployment.yaml
        kubectl apply -f k8s/microservicio-demo-service.yaml
